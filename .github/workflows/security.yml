# ================================================================
# .github/workflows/security.yml
# DevSecOps Security Pipeline — SECP SIEM Platform
#
# Pipeline Architecture (Step 9):
#
#   ┌──────────────┐   ┌──────────────┐   ┌──────────────────┐   ┌──────────────┐
#   │  SAST Stage   │   │  SCA Stage    │   │  Secrets Stage   │   │  IaC Stage    │
#   │  (Bandit,     │   │  (Dep-Check,  │   │  (Gitleaks,      │   │  (Checkov,    │
#   │   Semgrep)    │   │   Trivy FS)   │   │   TruffleHog)    │   │   Hadolint)   │
#   └──────┬───────┘   └──────┬───────┘   └────────┬─────────┘   └──────┬───────┘
#          │                  │                     │                    │
#          └──────────────────┴──────────┬──────────┴────────────────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │  Container Scan  │
#                              │     (Trivy)      │
#                              └────────┬────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │   DAST Stage     │
#                              │   (OWASP ZAP)    │
#                              └────────┬────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │  SBOM + Report   │
#                              │  (Syft)          │
#                              └─────────────────┘
# ================================================================

name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run full scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write   # Required for SARIF uploads to GitHub Security tab
  actions: read

jobs:

  # ─────────────────────────────────────────────
  # STEP 2 — SAST: Bandit (Python services)
  # Analyses source code without executing it.
  # ─────────────────────────────────────────────
  sast-bandit:
    name: "SAST · Bandit (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit on all Python services
        run: |
          bandit -r ./services/auth \
                    ./services/files \
                    ./services/mail \
                    ./services/messaging \
                    ./services/siem \
                 -f sarif -o bandit-results.sarif \
                 --exit-zero
        # --exit-zero prevents the step from failing the pipeline;
        # findings are still uploaded and visible in the Security tab.

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ─────────────────────────────────────────────
  # STEP 2 — SAST: Semgrep (JS/TS + multi-lang)
  # Multi-language SAST with OWASP Top 10 rules.
  # ─────────────────────────────────────────────
  sast-semgrep:
    name: "SAST · Semgrep (Multi-language)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─────────────────────────────────────────────
  # STEP 3 — SCA: OWASP Dependency-Check
  # Identifies known CVEs in third-party deps.
  # ─────────────────────────────────────────────
  sca-dependency-check:
    name: "SCA · OWASP Dependency-Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secp-devsecops"
          path: "."
          format: "SARIF"
          out: "dependency-check-report"
          args: >
            --enableRetired
            --failOnCVSS 7
            --suppression suppression.xml
        continue-on-error: true   # Don't block pipeline; review findings manually

      - name: Upload Dependency-Check SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
          category: dependency-check

  # ─────────────────────────────────────────────
  # STEP 3 — SCA: Trivy (filesystem scan)
  # Fast, accurate SCA across all ecosystems.
  # ─────────────────────────────────────────────
  sca-trivy-fs:
    name: "SCA · Trivy (filesystem)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ─────────────────────────────────────────────
  # STEP 4 — Secrets Detection: Gitleaks
  # Scans git history + staged changes.
  # ─────────────────────────────────────────────
  secrets-gitleaks:
    name: "Secrets · Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history required for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ─────────────────────────────────────────────
  # STEP 4 — Secrets Detection: TruffleHog
  # Entropy + pattern scanning in commits.
  # ─────────────────────────────────────────────
  secrets-trufflehog:
    name: "Secrets · TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────────
  # STEP 7 — IaC Scanning: Checkov
  # Scans Dockerfiles, docker-compose, k8s, etc.
  # ─────────────────────────────────────────────
  iac-checkov:
    name: "IaC · Checkov (Dockerfile + Compose)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ─────────────────────────────────────────────
  # STEP 7 — Dockerfile Linting: Hadolint
  # Best-practice linting for Dockerfiles.
  # ─────────────────────────────────────────────
  iac-hadolint:
    name: "IaC · Hadolint (Dockerfile linter)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile — ${{ matrix.service }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          format: sarif
          output-file: hadolint-${{ matrix.service }}.sarif
          no-fail: true

      - name: Upload Hadolint SARIF — ${{ matrix.service }}
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-${{ matrix.service }}.sarif
          category: hadolint-${{ matrix.service }}

  # ─────────────────────────────────────────────
  # STEP 5 — Container Image Scanning: Trivy
  # Scans OS packages + app dependencies in images.
  # Runs AFTER source-level scans pass.
  # ─────────────────────────────────────────────
  container-trivy:
    name: "Container · Trivy (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs:
      - sast-bandit
      - sast-semgrep
      - sca-dependency-check
      - sca-trivy-fs
      - secrets-gitleaks
      - secrets-trufflehog
      - iac-checkov
      - iac-hadolint
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image — ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            docker build -t secp/${{ matrix.service }}:${{ github.sha }} ./frontend
          else
            docker build -t secp/${{ matrix.service }}:${{ github.sha }} ./services/${{ matrix.service }}
          fi

      - name: Trivy image scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "secp/${{ matrix.service }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy image SARIF — ${{ matrix.service }}
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}



  # ─────────────────────────────────────────────
  # STEP 6 — DAST: OWASP ZAP Baseline Scan
  # Interacts with a RUNNING application to find
  # SQL injection, XSS, auth weaknesses, etc.
  # Runs LAST — after all static scans.
  # ─────────────────────────────────────────────
  dast-zap:
    name: "DAST · OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    needs:
      - container-trivy
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env <<EOF
          DB_PASS=ci_dummy_pass_4testing
          JWT_SECRET=ci_dummy_jwt_secret_32chars_long!
          WG_SERVER_PUBLIC_KEY=dummykey
          WG_SERVER_ENDPOINT=127.0.0.1
          VITE_ADMIN_GATEWAY_PATH=/
          EOF

      - name: Start application stack
        run: |
          docker compose -f docker-compose-dev.yml up -d --build
          echo "Waiting for services to be ready..."
          sleep 60

      - name: Health-check all services
        run: |
          echo "--- Frontend ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:3000 > /dev/null && echo "OK" || echo "FAIL"
          echo "--- Auth API (8001) ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:8001/health > /dev/null && echo "OK" || echo "FAIL"
          echo "--- Mail API (8002) ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:8002/health > /dev/null && echo "OK" || echo "FAIL"
          echo "--- Messaging API (8003) ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:8003/health > /dev/null && echo "OK" || echo "FAIL"
          echo "--- Files API (8004) ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:8004/health > /dev/null && echo "OK" || echo "FAIL"
          echo "--- SIEM API (8005) ---"
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost:8005/health > /dev/null && echo "OK" || echo "FAIL"

      - name: OWASP ZAP — Frontend (port 3000)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -J zap_frontend.json -w zap_frontend.md -r zap_frontend.html || true

      - name: OWASP ZAP — Auth API (port 8001)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8001 \
            -J zap_auth.json -w zap_auth.md -r zap_auth.html || true

      - name: OWASP ZAP — Mail API (port 8002)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8002 \
            -J zap_mail.json -w zap_mail.md -r zap_mail.html || true

      - name: OWASP ZAP — Messaging API (port 8003)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8003 \
            -J zap_messaging.json -w zap_messaging.md -r zap_messaging.html || true

      - name: OWASP ZAP — Files API (port 8004)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8004 \
            -J zap_files.json -w zap_files.md -r zap_files.html || true

      - name: OWASP ZAP — SIEM API (port 8005)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8005 \
            -J zap_siem.json -w zap_siem.md -r zap_siem.html || true

      - name: Upload all ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: zap_*.*

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v

  # ─────────────────────────────────────────────
  # SBOM Generation: Syft (CycloneDX / SPDX)
  # Generates Software Bill of Materials for
  # all service images.
  # ─────────────────────────────────────────────
  sbom-syft:
    name: "SBOM · Syft (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs:
      - container-trivy
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build image for SBOM — ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            docker build -t secp/${{ matrix.service }}:sbom ./frontend
          else
            docker build -t secp/${{ matrix.service }}:sbom ./services/${{ matrix.service }}
          fi

      - name: Generate SBOM — ${{ matrix.service }}
        uses: anchore/sbom-action@v0
        with:
          image: secp/${{ matrix.service }}:sbom
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json

      - name: Upload SBOM artifact — ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json

  # ─────────────────────────────────────────────
  # STEP 10 — Pipeline Summary
  # Final job that runs after everything else.
  # Provides a single pass/fail gate.
  # ─────────────────────────────────────────────
  pipeline-summary:
    name: "📊 Pipeline Summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - sast-bandit
      - sast-semgrep
      - sca-dependency-check
      - sca-trivy-fs
      - secrets-gitleaks
      - secrets-trufflehog
      - iac-checkov
      - iac-hadolint
      - container-trivy
      - dast-zap
      - sbom-syft
    steps:
      - name: Security Pipeline Summary
        run: |
          echo "╔════════════════════════════════════════════════════╗"
          echo "║       DevSecOps Security Pipeline — Summary       ║"
          echo "╠════════════════════════════════════════════════════╣"
          echo "║ SAST (Bandit):           ${{ needs.sast-bandit.result }}"
          echo "║ SAST (Semgrep):          ${{ needs.sast-semgrep.result }}"
          echo "║ SCA (Dependency-Check):  ${{ needs.sca-dependency-check.result }}"
          echo "║ SCA (Trivy FS):          ${{ needs.sca-trivy-fs.result }}"
          echo "║ Secrets (Gitleaks):      ${{ needs.secrets-gitleaks.result }}"
          echo "║ Secrets (TruffleHog):    ${{ needs.secrets-trufflehog.result }}"
          echo "║ IaC (Checkov):           ${{ needs.iac-checkov.result }}"
          echo "║ IaC (Hadolint):          ${{ needs.iac-hadolint.result }}"
          echo "║ Container (Trivy):       ${{ needs.container-trivy.result }}"

          echo "║ DAST (ZAP):              ${{ needs.dast-zap.result }}"
          echo "║ SBOM (Syft):             ${{ needs.sbom-syft.result }}"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""
          echo "All SARIF results are available in:"
          echo "  Repository → Security → Code Scanning"
          echo ""
          echo "ZAP reports and SBOM artifacts are available in:"
          echo "  Actions → This run → Artifacts"
