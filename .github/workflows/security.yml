# ================================================================
# .github/workflows/security.yml
# DevSecOps Security Pipeline — SECP SIEM Platform
#
# Pipeline Architecture (Step 9):
#
#   ┌──────────────┐   ┌──────────────┐   ┌──────────────────┐   ┌──────────────┐
#   │  SAST Stage   │   │  SCA Stage    │   │  Secrets Stage   │   │  IaC Stage    │
#   │  (Bandit,     │   │  (Dep-Check,  │   │  (Gitleaks,      │   │  (Checkov,    │
#   │   Semgrep)    │   │   Trivy FS)   │   │   TruffleHog)    │   │   Hadolint)   │
#   └──────┬───────┘   └──────┬───────┘   └────────┬─────────┘   └──────┬───────┘
#          │                  │                     │                    │
#          └──────────────────┴──────────┬──────────┴────────────────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │  Container Scan  │
#                              │     (Trivy)      │
#                              └────────┬────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │   DAST Stage     │
#                              │   (OWASP ZAP)    │
#                              └────────┬────────┘
#                                       │
#                              ┌────────▼────────┐
#                              │  SBOM + Report   │
#                              │  (Syft)          │
#                              └─────────────────┘
# ================================================================

name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run full scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write   # Required for SARIF uploads to GitHub Security tab
  actions: read

jobs:

  # ─────────────────────────────────────────────
  # STEP 2 — SAST: Bandit (Python services)
  # ─────────────────────────────────────────────
  sast-bandit:
    name: "SAST · Bandit (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit on all Python services
        run: |
          bandit -r ./services/auth \
                    ./services/files \
                    ./services/mail \
                    ./services/messaging \
                    ./services/siem \
                 -f sarif -o bandit-results.sarif \
                 --exit-zero

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Save Bandit results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-bandit
          path: bandit-results.sarif

  # ─────────────────────────────────────────────
  # STEP 2 — SAST: Semgrep (JS/TS + multi-lang)
  # ─────────────────────────────────────────────
  sast-semgrep:
    name: "SAST · Semgrep (Multi-language)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Save Semgrep results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-semgrep
          path: semgrep.sarif

  # ─────────────────────────────────────────────
  # STEP 3 — SCA: OWASP Dependency-Check
  # ─────────────────────────────────────────────
  sca-dependency-check:
    name: "SCA · OWASP Dependency-Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secp-devsecops"
          path: "."
          format: "SARIF"
          out: "dependency-check-report"
          args: >
            --enableRetired
            --failOnCVSS 7
            --suppression suppression.xml
        continue-on-error: true

      - name: Upload Dependency-Check SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
          category: dependency-check

      - name: Save Dependency-Check results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-dependency-check
          path: dependency-check-report/dependency-check-report.sarif

  # ─────────────────────────────────────────────
  # STEP 3 — SCA: Trivy (filesystem scan)
  # ─────────────────────────────────────────────
  sca-trivy-fs:
    name: "SCA · Trivy (filesystem)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Save Trivy FS results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-trivy-fs
          path: trivy-fs-results.sarif

  # ─────────────────────────────────────────────
  # STEP 4 — Secrets Detection: Gitleaks
  # ─────────────────────────────────────────────
  secrets-gitleaks:
    name: "Secrets · Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ─────────────────────────────────────────────
  # STEP 4 — Secrets Detection: TruffleHog
  # ─────────────────────────────────────────────
  secrets-trufflehog:
    name: "Secrets · TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────────
  # STEP 7 — IaC Scanning: Checkov
  # ─────────────────────────────────────────────
  iac-checkov:
    name: "IaC · Checkov (Dockerfile + Compose)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Save Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-checkov
          path: checkov-results.sarif

  # ─────────────────────────────────────────────
  # STEP 7 — Dockerfile Linting: Hadolint
  # ─────────────────────────────────────────────
  iac-hadolint:
    name: "IaC · Hadolint (Dockerfile linter)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile — ${{ matrix.service }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          format: sarif
          output-file: hadolint-${{ matrix.service }}.sarif
          no-fail: true

      - name: Upload Hadolint SARIF — ${{ matrix.service }}
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-${{ matrix.service }}.sarif
          category: hadolint-${{ matrix.service }}

      - name: Save Hadolint results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-hadolint-${{ matrix.service }}
          path: hadolint-${{ matrix.service }}.sarif

  # ─────────────────────────────────────────────
  # STEP 5 — Container Image Scanning: Trivy
  # ─────────────────────────────────────────────
  container-trivy:
    name: "Container · Trivy (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs:
      - sast-bandit
      - sast-semgrep
      - sca-dependency-check
      - sca-trivy-fs
      - secrets-gitleaks
      - secrets-trufflehog
      - iac-checkov
      - iac-hadolint
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image — ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            docker build -t secp/${{ matrix.service }}:${{ github.sha }} ./frontend
          else
            docker build -t secp/${{ matrix.service }}:${{ github.sha }} ./services/${{ matrix.service }}
          fi

      - name: Trivy image scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "secp/${{ matrix.service }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy image SARIF — ${{ matrix.service }}
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Save Trivy image results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-trivy-image-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif

  # ─────────────────────────────────────────────
  # STEP 6 — DAST: OWASP ZAP Baseline Scan
  #
  # FIXES APPLIED HERE:
  #   1. .env now loaded from GitHub Secrets
  #   2. WireGuard skipped (no kernel modules in CI)
  #   3. Proper per-service health wait loop with correct exit logic
  #   4. Logs dumped automatically on failure
  #   5. ZAP output dir pre-created with open permissions so the
  #      ZAP container (runs as UID 1000) can write report files
  #   6. Sentinel artifact always uploaded so security-report
  #      download never fails when DAST is skipped/fails
  # ─────────────────────────────────────────────
  dast-zap:
    name: "DAST · OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    needs:
      - container-trivy
    steps:
      - uses: actions/checkout@v4

      # ✅ FIX 1 — .env from GitHub Secrets (not hardcoded dummy values)
      # Required secrets to add in GitHub repo Settings → Secrets:
      #   DB_PASS, JWT_SECRET, WG_SERVER_PUBLIC_KEY,
      #   WG_SERVER_ENDPOINT, VITE_ADMIN_GATEWAY_PATH
      - name: Create .env for CI
        run: |
          cat > .env <<EOF
          DB_PASS=${{ secrets.DB_PASS }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          WG_SERVER_PUBLIC_KEY=${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_SERVER_ENDPOINT=${{ secrets.WG_SERVER_ENDPOINT }}
          VITE_ADMIN_GATEWAY_PATH=${{ secrets.VITE_ADMIN_GATEWAY_PATH }}
          EOF

      # ✅ FIX 5 — Pre-create ZAP output directory owned by runner so
      #   the ZAP container (UID 1000 inside) can write into the bind-mount.
      - name: Prepare ZAP output directory
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

      # ✅ FIX 2 — Skip WireGuard (requires kernel modules unavailable in CI)
      # --scale wireguard=0 starts all services EXCEPT wireguard
      - name: Start application stack
        run: |
          docker compose -f docker-compose-dev.yml up -d --build \
            --scale wireguard=0
          echo "Stack started — waiting for services to become healthy..."

      # ✅ FIX 3 — Proper wait loop with correct exit logic.
      #
      # Root causes of the original bug:
      #   a) `exit 1` inside the inner loop exited the loop body function,
      #      not the outer script — the loop continued silently.
      #   b) The check `if [ "$i" -eq 30 ]` only fired at the very last
      #      iteration, after sleep, so the 30th retry was never attempted.
      #
      # Fix:
      #   • Use a `HEALTHY` flag; set it to 1 on success.
      #   • After the inner loop, check the flag and exit the script if unset.
      #   • This correctly propagates failures out of the subshell.
      - name: Wait for all services to be healthy
        run: |
          SERVICES=(
            "localhost:8001/health"
            "localhost:8002/health"
            "localhost:8003/health"
            "localhost:8004/health"
            "localhost:8005/health"
            "localhost:3000"
          )

          MAX_RETRIES=30
          RETRY_INTERVAL=5

          for SERVICE in "${SERVICES[@]}"; do
            echo "⏳ Waiting for http://$SERVICE ..."
            HEALTHY=0
            for i in $(seq 1 $MAX_RETRIES); do
              if curl -sf "http://$SERVICE" > /dev/null 2>&1; then
                echo "✅ $SERVICE is up (attempt $i)"
                HEALTHY=1
                break
              fi
              echo "   attempt $i/$MAX_RETRIES — retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "❌ $SERVICE never became healthy after $MAX_RETRIES attempts — dumping logs"
              docker compose -f docker-compose-dev.yml logs --tail=100
              exit 1
            fi
          done

          echo "🟢 All services are healthy — starting ZAP scans"

      # ✅ FIX 4 — Dump logs automatically on any failure
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose-dev.yml logs --tail=200

      # Each ZAP step writes into ./zap-output so all reports land in one
      # place regardless of the container's working directory.
      - name: OWASP ZAP — Frontend (port 3000)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -J zap_frontend.json -w zap_frontend.md -r zap_frontend.html || true

      - name: OWASP ZAP — Auth API (port 8001)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8001 \
            -J zap_auth.json -w zap_auth.md -r zap_auth.html || true

      - name: OWASP ZAP — Mail API (port 8002)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8002 \
            -J zap_mail.json -w zap_mail.md -r zap_mail.html || true

      - name: OWASP ZAP — Messaging API (port 8003)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8003 \
            -J zap_messaging.json -w zap_messaging.md -r zap_messaging.html || true

      - name: OWASP ZAP — Files API (port 8004)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8004 \
            -J zap_files.json -w zap_files.md -r zap_files.html || true

      - name: OWASP ZAP — SIEM API (port 8005)
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8005 \
            -J zap_siem.json -w zap_siem.md -r zap_siem.html || true

      # ✅ FIX 6 — Always upload the artifact, even if ZAP produced no files.
      #   Write a sentinel file first so the artifact is never empty
      #   (upload-artifact@v4 fails on an empty directory).
      #   The security-report job can then download it unconditionally
      #   without continue-on-error gymnastics.
      - name: Upload all ZAP reports
        if: always()
        run: |
          # Ensure at least one file exists so the artifact upload never fails
          # on an empty directory (e.g. when all ZAP targets were unreachable).
          if [ -z "$(ls -A zap-output 2>/dev/null)" ]; then
            echo "No ZAP reports were produced." > zap-output/zap_sentinel.txt
          fi

      - name: Upload ZAP reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: zap-output/

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v

  # ─────────────────────────────────────────────
  # SBOM Generation: Syft (CycloneDX / SPDX)
  # ─────────────────────────────────────────────
  sbom-syft:
    name: "SBOM · Syft (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs:
      - container-trivy
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - files
          - mail
          - messaging
          - siem
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build image for SBOM — ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            docker build -t secp/${{ matrix.service }}:sbom ./frontend
          else
            docker build -t secp/${{ matrix.service }}:sbom ./services/${{ matrix.service }}
          fi

      - name: Generate SBOM — ${{ matrix.service }}
        uses: anchore/sbom-action@v0
        with:
          image: secp/${{ matrix.service }}:sbom
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json

      - name: Upload SBOM artifact — ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json

  # ─────────────────────────────────────────────
  # STEP 10 — Security Findings Report (D4)
  # ─────────────────────────────────────────────
  security-report:
    name: "📊 Security Findings Report"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - sast-bandit
      - sast-semgrep
      - sca-dependency-check
      - sca-trivy-fs
      - secrets-gitleaks
      - secrets-trufflehog
      - iac-checkov
      - iac-hadolint
      - container-trivy
      - dast-zap
      - sbom-syft
    steps:
      - name: Download all SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          path: sarif-results
          merge-multiple: false

      # ✅ FIX — Download ZAP reports with continue-on-error so the
      #   security-report job never fails when the dast-zap job was
      #   skipped, cancelled, or failed before uploading its artifact.
      #   The Python report script already handles a missing zap-results
      #   directory gracefully.
      - name: Download ZAP reports
        uses: actions/download-artifact@v4
        with:
          name: zap-reports
          path: zap-results
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Security Findings Report
        run: |
          cat > generate_report.py << 'PYTHON_SCRIPT'
          import json, os, glob, datetime

          report_lines = []
          def add(line=""):
              report_lines.append(line)

          add("# 🔒 DevSecOps Security Findings Report")
          add(f"")
          add(f"**Generated:** {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          add(f"**Repository:** SECP SIEM Platform")
          add(f"**Pipeline Run:** [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})")
          add()
          add("---")
          add()

          add("## 1. Pipeline Execution Summary")
          add()
          add("| Stage | Tool | Status |")
          add("|-------|------|--------|")
          statuses = {
              "SAST": [("Bandit (Python)", "${{ needs.sast-bandit.result }}"), ("Semgrep (Multi-lang)", "${{ needs.sast-semgrep.result }}")],
              "SCA": [("OWASP Dep-Check", "${{ needs.sca-dependency-check.result }}"), ("Trivy FS", "${{ needs.sca-trivy-fs.result }}")],
              "Secrets": [("Gitleaks", "${{ needs.secrets-gitleaks.result }}"), ("TruffleHog", "${{ needs.secrets-trufflehog.result }}")],
              "IaC": [("Checkov", "${{ needs.iac-checkov.result }}"), ("Hadolint", "${{ needs.iac-hadolint.result }}")],
              "Container": [("Trivy Image", "${{ needs.container-trivy.result }}")],
              "DAST": [("OWASP ZAP", "${{ needs.dast-zap.result }}")],
              "SBOM": [("Syft", "${{ needs.sbom-syft.result }}")],
          }
          for stage, tools in statuses.items():
              for tool_name, result in tools:
                  icon = "✅" if result == "success" else "⚠️" if result == "failure" else "⏭️"
                  add(f"| {stage} | {tool_name} | {icon} {result} |")
          add()

          def parse_sarif(filepath):
              findings = []
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      data = json.load(f)
                  for run in data.get('runs', []):
                      tool_name = run.get('tool', {}).get('driver', {}).get('name', 'Unknown')
                      rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
                      for result in run.get('results', []):
                          rule_id = result.get('ruleId', 'N/A')
                          level = result.get('level', 'warning')
                          message = result.get('message', {}).get('text', 'No description')
                          if len(message) > 120:
                              message = message[:117] + '...'
                          location = 'N/A'
                          line_num = ''
                          locs = result.get('locations', [])
                          if locs:
                              phys = locs[0].get('physicalLocation', {})
                              uri = phys.get('artifactLocation', {}).get('uri', '')
                              region = phys.get('region', {})
                              start_line = region.get('startLine', '')
                              if uri:
                                  location = uri
                                  if start_line:
                                      line_num = str(start_line)
                          severity = level.upper()
                          if severity == 'ERROR':
                              severity = 'HIGH'
                          elif severity == 'WARNING':
                              severity = 'MEDIUM'
                          elif severity == 'NOTE':
                              severity = 'LOW'
                          findings.append({
                              'tool': tool_name,
                              'rule': rule_id,
                              'severity': severity,
                              'file': location,
                              'line': line_num,
                              'message': message,
                          })
              except Exception as e:
                  print(f"Warning: Could not parse {filepath}: {e}")
              return findings

          all_findings = {}
          categories = {
              'bandit': 'SAST (Bandit)',
              'semgrep': 'SAST (Semgrep)',
              'dependency-check': 'SCA (Dependency-Check)',
              'trivy-fs': 'SCA (Trivy FS)',
              'checkov': 'IaC (Checkov)',
              'hadolint': 'IaC (Hadolint)',
              'trivy-image': 'Container (Trivy)',
          }

          sarif_dir = 'sarif-results'
          if os.path.exists(sarif_dir):
              for sarif_file in sorted(glob.glob(os.path.join(sarif_dir, '**', '*.sarif'), recursive=True)):
                  rel_path = os.path.relpath(sarif_file, sarif_dir)
                  cat_key = 'unknown'
                  for key in categories:
                      if key in rel_path.lower():
                          cat_key = key
                          break
                  cat_name = categories.get(cat_key, f'Other ({cat_key})')
                  findings = parse_sarif(sarif_file)
                  if cat_name not in all_findings:
                      all_findings[cat_name] = []
                  all_findings[cat_name].extend(findings)

          add("## 2. Findings Overview")
          add()
          total = sum(len(f) for f in all_findings.values())
          add(f"**Total findings across all tools: {total}**")
          add()
          add("| Category | Total | High/Critical | Medium | Low |")
          add("|----------|-------|---------------|--------|-----|")
          for cat_name in ['SAST (Bandit)', 'SAST (Semgrep)', 'SCA (Dependency-Check)', 'SCA (Trivy FS)', 'IaC (Checkov)', 'IaC (Hadolint)', 'Container (Trivy)']:
              findings = all_findings.get(cat_name, [])
              high = len([f for f in findings if f['severity'] in ('HIGH', 'CRITICAL', 'ERROR')])
              med = len([f for f in findings if f['severity'] in ('MEDIUM', 'WARNING')])
              low = len([f for f in findings if f['severity'] in ('LOW', 'NOTE', 'INFO')])
              add(f"| {cat_name} | {len(findings)} | {high} | {med} | {low} |")
          add()

          add("---")
          add()
          add("## 3. Detailed Findings by Category")
          add()

          section_num = 1
          for cat_name in ['SAST (Bandit)', 'SAST (Semgrep)', 'SCA (Dependency-Check)', 'SCA (Trivy FS)', 'IaC (Checkov)', 'IaC (Hadolint)', 'Container (Trivy)']:
              findings = all_findings.get(cat_name, [])
              add(f"### 3.{section_num} {cat_name}")
              add()
              if not findings:
                  add("_No findings detected._")
              else:
                  add(f"**{len(findings)} finding(s)**")
                  add()
                  add("| # | Severity | Rule ID | File | Line | Description |")
                  add("|---|----------|---------|------|------|-------------|")
                  for i, f in enumerate(findings[:50], 1):
                      msg = f['message'].replace('|', '\\|')
                      add(f"| {i} | {f['severity']} | {f['rule']} | {f['file']} | {f['line']} | {msg} |")
                  if len(findings) > 50:
                      add(f"| ... | ... | ... | ... | ... | _+{len(findings)-50} more findings (see SARIF artifacts)_ |")
              add()
              section_num += 1

          add(f"### 3.{section_num} DAST (OWASP ZAP)")
          add()
          zap_dir = 'zap-results'
          if os.path.exists(zap_dir):
              zap_files = sorted(glob.glob(os.path.join(zap_dir, '*.md')))
              if zap_files:
                  add(f"ZAP scanned {len(zap_files)} target(s). See the `zap-reports` artifact for full HTML reports.")
                  add()
                  for zf in zap_files:
                      service = os.path.basename(zf).replace('zap_', '').replace('.md', '')
                      add(f"- **{service}**: See `{os.path.basename(zf)}`")
              else:
                  add("_No ZAP markdown reports found (ZAP may not have produced output for any target)._")
          else:
              add("_ZAP reports not available (DAST job was skipped, cancelled, or failed before uploading)._")
          add()

          report_content = '\n'.join(report_lines)
          with open('security-findings-report.md', 'w', encoding='utf-8') as f:
              f.write(report_content)
          print(report_content)
