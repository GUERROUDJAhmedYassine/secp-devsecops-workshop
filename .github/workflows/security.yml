  # ─────────────────────────────────────────────
  # STEP 9 — CD: Push to GitHub Container Registry
  # ─────────────────────────────────────────────
  deploy-ghcr:
    name: "🚀 CD · Push to GHCR"
    runs-on: ubuntu-latest
    needs: [container-trivy, dast-zap]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [auth, files, mail, messaging, siem, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push — ${{ matrix.service }}
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO/${{ matrix.service }}
          if [ "${{ matrix.service }}" == "frontend" ]; then
            docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} ./frontend
          else
            docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} ./services/${{ matrix.service }}
          fi
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
