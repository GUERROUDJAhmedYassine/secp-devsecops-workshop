version: '3.9'

services:

  auth:
    build: ./services/auth
    ports:
      - '8001:8001'
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/secp
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    build: ./services/mail
    ports:
      - '8002:8002'
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/secp
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
    depends_on:
      mailhog:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  messaging:
    build: ./services/messaging
    ports:
      - '8003:8003'
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/secp
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  files:
    build: ./services/files
    ports:
      - '8004:8004'
    volumes:
      - './uploads:/app/uploads'
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/secp
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  siem:
    build: ./services/siem
    ports:
      - '8005:8005'
      - '8006:8006'
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/secp
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks:
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: postgres
      POSTGRES_DB: secp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

networks:
  backend:
    driver: bridge