services:

  db-migrate:
    image: postgres:18
    environment:
      PGPASSWORD: ${DB_PASS}
    volumes:
      - ./db/init.sql:/init.sql
    command: psql -h 10.0.0.2 -U postgres -d secp -f /init.sql
    networks:
      - backend
    restart: on-failure

  auth:
    build: ./services/auth
    ports:
      - "8001:8001"
    cap_add:
      - NET_ADMIN
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@10.0.0.2:5432/secp?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT}
      WG_CONFIG_PATH: /etc/wireguard/wg0.conf
    volumes:
      - ./services/auth/app:/app/app
      - /etc/wireguard:/etc/wireguard
      - /var/run/wireguard:/var/run/wireguard
    command: sh -c "python app/create_superuser.py && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mail:
    build: ./services/mail
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@10.0.0.2:5432/secp?sslmode=disable
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mailhog:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  messaging:
    build: ./services/messaging
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    volumes:
      - ./services/messaging/app:/app/app
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@10.0.0.2:5432/secp?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      SERVICE_NAME: messaging
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  files:
    build: ./services/files
    ports:
      - "8004:8004"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
    volumes:
      - ./services/files/app:/app/app
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@10.0.0.2:5432/secp?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  siem:
    build: ./services/siem
    ports:
      - "8005:8005"
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@10.0.0.2:5432/secp?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      mail:
        condition: service_healthy
      messaging:
        condition: service_healthy
      files:
        condition: service_healthy
      siem:
        condition: service_healthy
    networks:
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  backend:
    driver: bridge
