server {
    listen 3000;
    server_name _;

    # ── Static frontend ──────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Auth service (network_mode: host → reach via host gateway) ───
    location /api/auth/ {
        proxy_pass http://host.docker.internal:8001/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Mail service ─────────────────────────────────────────────────
    location /api/mail/ {
        proxy_pass http://mail:8002/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Messaging service (REST) ──────────────────────────────────────
    location /api/msg/ {
        proxy_pass http://messaging:8003/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Messaging WebSocket ───────────────────────────────────────────
    location /api/msg-ws {
        proxy_pass         http://messaging:8003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Files service ─────────────────────────────────────────────────
    location /api/files/ {
        proxy_pass http://files:8004/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        client_max_body_size 100M;
    }

    # ── Files WebSocket ───────────────────────────────────────────────
    location /api/files-ws/ {
        proxy_pass         http://files:8004/files/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── SIEM service (REST) ───────────────────────────────────────────
    location /api/siem/ {
        proxy_pass http://siem:8005/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── SIEM WebSocket ────────────────────────────────────────────────
    location /api/siem-ws {
        proxy_pass         http://siem:8006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
